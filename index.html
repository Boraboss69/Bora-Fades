<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bora Fades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0c0a; --bg-alt:#151310; --surface:#1b1815; --surface-2:#221e19; --border:#332c22;
  --gold:#c6a15b; --gold-bright:#e3c284; --gold-dim:#8a723f;
  --text:#f3ede1; --text-muted:#9c9284; --text-faint:#665f52;
  --green:#5a9a6f; --green-bg:rgba(90,154,111,.14);
  --yellow:#d6a23c; --yellow-bg:rgba(214,162,60,.14);
  --red:#b5573d; --red-bg:rgba(181,87,61,.16);
  --radius:14px; --shadow:0 12px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:radial-gradient(ellipse 900px 500px at 15% -10%, rgba(198,161,91,.08), transparent 60%),var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--gold-dim);color:#fff;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
a{color:inherit;}
.hidden{display:none !important;}

#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{width:100%;max-width:380px;background:linear-gradient(180deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-radius:20px;padding:38px 32px 32px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.brand-mark{width:56px;height:56px;border-radius:50%;border:1.5px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;background:radial-gradient(circle at 35% 30%, rgba(198,161,91,.18), transparent 70%);}
.brand-mark span{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:19px;color:var(--gold-bright);}
.login-card h1{text-align:center;font-size:24px;font-weight:500;margin:0 0 4px;letter-spacing:.2px;}
.login-sub{text-align:center;color:var(--text-muted);font-size:13.5px;margin:0 0 28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:7px;font-weight:600;}
.field input{width:100%;background:var(--bg-alt);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:14.5px;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--gold-dim);}
.pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:30px;height:30px;border:none;background:transparent;color:var(--text-faint);display:flex;align-items:center;justify-content:center;border-radius:6px;}
.pw-toggle:hover{color:var(--text-muted);background:var(--surface-2);}
.pw-toggle.active{color:var(--gold-bright);}
.btn{border:none;border-radius:10px;padding:12px 18px;font-size:14.5px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s, opacity .15s, background .15s;}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#211a0d;width:100%;}
.btn-gold:hover{filter:brightness(1.06);}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--gold-dim);}
.btn-outline-gold{background:transparent;border:1px solid var(--gold-dim);color:var(--gold-bright);}
.btn-outline-gold:hover{background:rgba(198,161,91,.1);}
.btn-danger{background:rgba(181,87,61,.15);color:#e5947c;border:1px solid rgba(181,87,61,.35);}
.btn-danger:hover{background:rgba(181,87,61,.25);}
.btn-success{background:rgba(90,154,111,.16);color:#8bd6a2;border:1px solid rgba(90,154,111,.4);}
.btn-success:hover{background:rgba(90,154,111,.26);}
.modal-x{position:absolute;top:16px;right:16px;width:28px;height:28px;border:none;background:var(--surface-2);color:var(--text-muted);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;}
.modal-x:hover{color:var(--text);}
.btn-sm{padding:8px 12px;font-size:12.5px;border-radius:8px;}
.login-error{background:var(--red-bg);border:1px solid rgba(181,87,61,.35);color:#e5947c;font-size:12.5px;padding:9px 12px;border-radius:8px;margin-bottom:14px;text-align:center;}
.login-links{margin-top:18px;text-align:center;}
.login-links a{font-size:12.5px;color:var(--text-muted);text-decoration:none;}
.login-links a:hover{color:var(--gold-bright);}

#app{display:none;min-height:100vh;}
.app-shell{display:flex;min-height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--bg-alt);border-right:1px solid var(--border);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:4px 8px 26px;}
.sb-brand .brand-mark{width:34px;height:34px;margin:0;}
.sb-brand .brand-mark span{font-size:12px;}
.sb-brand-text{display:flex;flex-direction:column;}
.sb-brand-text b{font-family:'Fraunces',serif;font-size:15px;font-weight:500;}
.sb-brand-text small{color:var(--text-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;}
.nav-group{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--text-muted);font-size:13.5px;font-weight:600;background:transparent;border:none;text-align:left;width:100%;position:relative;transition:background .15s,color .15s;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav-item:hover{background:var(--surface);color:var(--text);}
.nav-item.active{background:var(--surface-2);color:var(--gold-bright);}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--gold-bright),var(--gold-dim));}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.who{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;margin-bottom:8px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold-bright);flex-shrink:0;}
.who-text b{display:block;font-size:12.5px;}
.who-text small{color:var(--text-faint);font-size:10.5px;}

.main{flex:1;min-width:0;padding:30px 34px 60px;max-width:1100px;}
.topbar{display:none;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px;flex-wrap:wrap;gap:14px;}
.page-head h2{font-size:26px;font-weight:500;margin:0;}
.page-head p{color:var(--text-muted);font-size:13.5px;margin:4px 0 0;}

.grid{display:grid;gap:16px;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:2fr 1fr;}
@media(max-width:880px){.grid-3{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}}

.card{background:linear-gradient(180deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-card{padding:18px 20px;}
.stat-card .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);font-weight:700;margin-bottom:10px;}
.stat-card .stat-value{font-family:'Fraunces',serif;font-size:30px;font-weight:500;color:var(--gold-bright);}
.stat-card .stat-sub{font-size:12px;color:var(--text-muted);margin-top:4px;}

.section-title{font-size:15px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;}
.section-title span.tag{font-size:11px;background:var(--surface-2);color:var(--text-muted);padding:3px 9px;border-radius:20px;font-weight:600;}

.list-row{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:10px;border-bottom:1px solid var(--border);}
.list-row:last-child{border-bottom:none;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-green{background:var(--green);} .dot-yellow{background:var(--yellow);} .dot-red{background:var(--red);} .dot-black{background:#555;border:1px solid #777;}
.row-main{flex:1;min-width:0;}
.row-main b{font-size:13.5px;display:block;}
.row-main small{color:var(--text-muted);font-size:12px;}
.pill{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
.pill-green{background:var(--green-bg);color:#8bd6a2;} .pill-yellow{background:var(--yellow-bg);color:#eec168;} .pill-red{background:var(--red-bg);color:#e5947c;} .pill-gray{background:var(--surface-2);color:var(--text-muted);}

.empty-state{padding:34px 18px;text-align:center;color:var(--text-faint);font-size:13px;}
.empty-state svg{width:34px;height:34px;margin-bottom:10px;opacity:.5;}

.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-head .month-label{font-family:'Fraunces',serif;font-size:19px;font-weight:500;}
.cal-nav{display:flex;gap:6px;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{color:var(--gold-bright);border-color:var(--gold-dim);}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:11.5px;color:var(--text-muted);}
.legend span{display:flex;align-items:center;gap:6px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{text-align:center;font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;padding-bottom:6px;font-weight:700;}
.cal-day{aspect-ratio:1/1;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;font-size:13px;font-weight:600;transition:border-color .15s,transform .1s;}
.cal-day:not(.empty):hover{border-color:var(--gold-dim);transform:translateY(-1px);}
.cal-day.empty{visibility:hidden;}
.cal-day.today{box-shadow:inset 0 0 0 1.5px var(--gold-dim);}
.cal-day .dots{display:flex;gap:3px;}
.cal-count{position:absolute;top:4px;right:5px;font-size:9.5px;font-weight:800;color:var(--gold-bright);background:rgba(198,161,91,.16);border-radius:8px;padding:1px 5px;line-height:1.3;}

.carousel{position:relative;width:100%;aspect-ratio:4/3;border-radius:var(--radius);overflow:hidden;margin-bottom:22px;border:1px solid var(--border);background:var(--bg-alt);}
.carousel-track{display:flex;height:100%;transition:transform .45s ease;touch-action:pan-y;}
.carousel-slide{min-width:100%;height:100%;flex-shrink:0;background:var(--bg-alt);}
.carousel-slide img{width:100%;height:100%;object-fit:contain;display:block;}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;border:none;background:rgba(13,12,10,.55);color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);z-index:2;}
.carousel-arrow svg{width:20px;height:20px;}
.carousel-arrow:hover{background:rgba(13,12,10,.8);}
.carousel-arrow.left{left:12px;} .carousel-arrow.right{right:12px;}
.carousel-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:2;}
.carousel-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:background .2s;}
.carousel-dots span.active{background:var(--gold-bright);}
.carousel-del{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:9px;border:none;background:rgba(181,87,61,.85);color:#fff;display:flex;align-items:center;justify-content:center;z-index:3;font-size:18px;line-height:1;}
.carousel-del:hover{background:rgba(181,87,61,1);}
.carousel-empty{width:100%;aspect-ratio:4/3;border-radius:var(--radius);border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-faint);margin-bottom:22px;cursor:pointer;}
.carousel-empty:hover{border-color:var(--gold-dim);color:var(--text-muted);}
.carousel-empty svg{width:32px;height:32px;}
.carousel-addbtn{position:absolute;top:12px;left:12px;z-index:3;width:auto;}
.crop-viewport{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;border-radius:12px;border:1px solid var(--border);background:#000;touch-action:none;cursor:grab;}
.crop-viewport:active{cursor:grabbing;}
.crop-viewport img{position:absolute;left:0;top:0;max-width:none;user-select:none;-webkit-user-drag:none;}
.crop-hint{font-size:11.5px;color:var(--text-faint);text-align:center;margin:8px 0 0;}
input[type=range]{accent-color:var(--gold);}
.cal-day.tint-green{background:var(--green-bg);}
.cal-day.tint-yellow{background:var(--yellow-bg);}
.cal-day.tint-red{background:var(--red-bg);}
.cal-day.tint-black{background:#1a1a1a;color:#666;}
.cal-day.past{opacity:.35;}

.slot-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap;}
.slot-action{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}

.cust-table{width:100%;border-collapse:collapse;}
.cust-table th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);padding:0 10px 10px;font-weight:700;}
.cust-table td{padding:12px 10px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle;}
.cust-table tr:hover td{background:rgba(255,255,255,.015);}
.status-active{color:var(--green);} .status-locked{color:var(--red);}
.table-actions{display:flex;gap:6px;flex-wrap:wrap;}

.modal-overlay{position:fixed;inset:0;background:rgba(8,7,5,.72);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{width:100%;max-width:440px;max-height:88vh;overflow-y:auto;background:linear-gradient(180deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:var(--shadow);position:relative;}
.modal h3{margin:0 0 4px;font-size:19px;font-weight:500;}
.modal .modal-sub{color:var(--text-muted);font-size:12.5px;margin:0 0 20px;}
.modal-actions{display:flex;gap:10px;margin-top:22px;}
.modal-actions .btn{flex:1;}
textarea{width:100%;background:var(--bg-alt);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:13.5px;resize:vertical;min-height:70px;outline:none;}
textarea:focus, select:focus{border-color:var(--gold-dim);}
select{width:100%;background:var(--bg-alt);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:13.5px;outline:none;appearance:none;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.copy-box{background:var(--bg-alt);border:1px dashed var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--text-muted);margin-bottom:12px;word-break:break-all;line-height:1.6;}
.file-drop{border:1.5px dashed var(--border);border-radius:10px;padding:16px;text-align:center;font-size:12.5px;color:var(--text-faint);cursor:pointer;}
.file-drop:hover{border-color:var(--gold-dim);color:var(--text-muted);}
.file-preview{margin-top:10px;max-width:100%;border-radius:10px;border:1px solid var(--border);}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;color:var(--text-muted);}
.checkbox-row input{width:16px;height:16px;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-2);border:1px solid var(--gold-dim);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .25s;z-index:200;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.bottom-nav{display:none;}
@media(max-width:880px){
  .sidebar{display:none;}
  .main{padding:20px 16px 100px;max-width:100%;}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg-alt);border-top:1px solid var(--border);z-index:50;padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
  .bottom-nav .nav-item{align-items:center;justify-content:center;flex-direction:column;gap:3px;font-size:10px;flex:1;padding:8px 2px;}
  .bottom-nav .nav-item.active::before{left:20%;right:20%;top:0;bottom:auto;height:2px;width:auto;}
  .grid-3{grid-template-columns:1fr 1fr;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="brand-mark"><span>BF</span></div>
    <h1>Bora Fades</h1>
    <p class="login-sub">Nur auf Einladung. Melde dich mit deinen Zugangsdaten an.</p>
    <div id="loginError" class="login-error hidden"></div>
    <form id="loginForm">
      <div class="field"><label>Benutzername</label><input id="loginUser" type="text" autocomplete="username" required></div>
      <div class="field"><label>Passwort</label><input id="loginPass" type="password" autocomplete="current-password" required></div>
      <button type="submit" class="btn btn-gold">Anmelden</button>
    </form>
    <div class="login-links"><a href="#" id="forgotLink">Passwort vergessen?</a></div>
  </div>
</div>

<div id="app">
  <div class="app-shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div id="viewRoot"></div>
    </div>
  </div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SLOT_START = 7, SLOT_END = 24;

let DATA = null;
let session = null;
let GALLERY = [];
let carouselIndex = 0;
let carouselTimer = null;
let currentView = 'dashboard';
let calCursor = new Date(); calCursor.setDate(1);
let selectedDay = null;

function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDateHuman(s){ const d=parseDate(s); return d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}); }
function initials(name){ return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function timeOptions(){ const t=[]; for(let m=SLOT_START*60; m<=SLOT_END*60; m+=15){ t.push(`${pad(Math.floor(m/60))}:${pad(m%60)}`); } return t; }
function toMinutes(hhmm){ const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function getStyleNames(){ return DATA.styles.map(s=>s.name); }

function applyState(state){
  DATA = {
    siteName: state.site_name,
    ownerName: state.owner_name,
    ownerEmail: state.owner_email || '',
    ownerUsername: state.owner_username || '',
    ownerUsernameChangedAt: state.owner_username_changed_at || null,
    styles: state.styles || [],
    customers: state.role === 'owner' ? (state.customers || []) : [state.me],
    appointments: state.appointments || [],
    blocks: state.blocks || [],
    confirmedBusy: state.confirmedBusy || [],
    mustSetup: state.role === 'customer' && !!(state.me && state.me.mustSetup)
  };
  document.title = DATA.siteName;
}

function notifyEvent(type, appointmentId){
  sb.functions.invoke('notify', { body: { token: session.token, appointment_id: appointmentId, type } }).catch(()=>{});
}

function usernameCooldownText(changedAt){
  if(!changedAt) return null;
  const availableAt = new Date(changedAt);
  availableAt.setDate(availableAt.getDate() + 30);
  const now = new Date();
  if(availableAt <= now) return null;
  return availableAt.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function withLock(btn, fn){
  if(btn.disabled) return;
  btn.disabled = true;
  const original = btn.textContent;
  Promise.resolve(fn()).finally(()=>{ btn.disabled = false; btn.textContent = original; });
}

function addPasswordToggles(root){
  (root||document).querySelectorAll('input[type="password"]').forEach(input=>{
    if(input.dataset.toggleWired) return;
    input.dataset.toggleWired = '1';
    const wrap = document.createElement('span');
    wrap.style.cssText = 'position:relative;display:block;';
    input.parentNode.insertBefore(wrap, input);
    wrap.appendChild(input);
    input.style.paddingRight = '42px';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pw-toggle';
    btn.setAttribute('aria-label', 'Passwort anzeigen');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="17" height="17"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z"/><circle cx="12" cy="12" r="3"/></svg>';
    btn.addEventListener('click', ()=>{
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.classList.toggle('active', !showing);
    });
    wrap.appendChild(btn);
  });
}

async function refreshState(){
  const { data, error } = await sb.rpc('rpc_get_state', { p_token: session.token });
  if(error || !data || data.error){ forceLogout(); return false; }
  applyState(data);
  return true;
}

function forceLogout(){
  session = null;
  stopPolling();
  clearInterval(carouselTimer); carouselTimer = null;
  GALLERY = []; carouselIndex = 0;
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

let pollTimer = null;
function startPolling(){
  stopPolling();
  pollTimer = setInterval(async ()=>{
    if(!session) return;
    if(document.getElementById('modalRoot').innerHTML.trim()) return;
    const ok = await refreshState();
    if(ok) renderView();
  }, 18000);
}
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer = null; } }

let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}

function openModal(html, opts){
  opts = opts || {};
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay" id="modalOverlay"><div class="modal">${html}</div></div>`;
  if(!opts.blocking){
    document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if(e.target.id==='modalOverlay') closeModal(); });
  }
  addPasswordToggles(document.getElementById('modalRoot'));
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');

  const { data, error } = await sb.rpc('rpc_login', { p_username: u, p_password: p });
  if(error || !data){
    errEl.textContent = 'Verbindung fehlgeschlagen. Bitte versuche es erneut.';
    errEl.classList.remove('hidden'); return;
  }
  if(data.error === 'locked'){
    errEl.textContent = 'Dieser Account wurde gesperrt. Bitte wende dich an den Owner.';
    errEl.classList.remove('hidden'); return;
  }
  if(data.error){
    errEl.textContent = 'Benutzername oder Passwort ist falsch.';
    errEl.classList.remove('hidden'); return;
  }
  session = { token: data.token, role: data.role === 'owner' ? 'owner' : 'kunde', customerId: data.customer_id };
  localStorage.setItem(SESSION_KEY, data.token);
  if(await refreshState()) enterApp();
});

document.getElementById('forgotLink').addEventListener('click', (e)=>{

function forgotModal(){
  return `

  <p class="modal-sub">Gib deinen Benutzernamen und deine hinterlegte E-Mail-Adresse ein. Du bekommst dann eine E-Mail mit einem Link zum Zurücksetzen.</p>

  <div class="field"><label>Benutzername</label><input id="forgotUser" placeholder="Benutzername"></div>
  <div class="field"><label>E-Mail</label><input id="forgotEmail" type="email" placeholder="E-Mail-Adresse"></div>
  <div class="modal-actions"><button class="btn btn-gold" id="forgotSubmitBtn">E-Mail zum Zurücksetzen senden</button></div>`;
}
function wireForgotModal(){
  document.getElementById('forgotSubmitBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    const username = document.getElementById('forgotUser').value.trim();
    const email = document.getElementById('forgotEmail').value.trim();
    const errEl = document.getElementById('forgotError');
    errEl.classList.add('hidden');
    if(!username || !email){
      errEl.textContent = 'Bitte beide Felder ausfüllen.';
      errEl.classList.remove('hidden');
      return;
    }
    const { data, error } = await sb.functions.invoke('forgot-password', { body: { username, email } });
    if(error || !data || data.error === 'not_found'){
      errEl.textContent = 'Kein Account mit diesen Angaben gefunden. Bitte Benutzername und E-Mail genau prüfen.';
      errEl.classList.remove('hidden');
      return;
    }
    if(data.error === 'email_not_configured'){
      errEl.textContent = 'E-Mail-Versand ist noch nicht eingerichtet. Bitte wende dich an den Owner.';
      errEl.classList.remove('hidden');
      return;
    }
    if(data.error){
      errEl.textContent = 'Der Versand ist fehlgeschlagen. Bitte versuche es später erneut.';
      errEl.classList.remove('hidden');
      return;
    }
    openModal(`
      <h3>E-Mail verschickt</h3>
      <p class="modal-sub">Wir haben dir eine E-Mail mit einem Link zum Zurücksetzen geschickt. Der Link ist 30 Minuten gültig.</p>
      <div class="modal-actions"><button class="btn btn-ghost" style="width:100%" id="closeModalBtn">Zum Login</button></div>`);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  }));
}

function showResetPasswordScreen(resetToken){
  document.getElementById('loginScreen').innerHTML = `
    <div class="login-card">
      <div class="brand-mark"><span>BF</span></div>
      <h1>Neues Passwort</h1>
      <p class="login-sub">Vergib ein neues Passwort für deinen Account.</p>
      <div id="resetError" class="login-error hidden"></div>
      <div class="field"><label>Neues Passwort</label><input id="resetNewPw" type="password" minlength="4" required></div>
      <button class="btn btn-gold" id="resetSubmitBtn">Passwort setzen</button>
    </div>`;
  addPasswordToggles(document.getElementById('loginScreen'));
  document.getElementById('resetSubmitBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    const pw = document.getElementById('resetNewPw').value;
    const errEl = document.getElementById('resetError');
    if(!pw || pw.length < 4){ errEl.textContent = 'Mindestens 4 Zeichen.'; errEl.classList.remove('hidden'); return; }
    const { data, error } = await sb.rpc('rpc_reset_password_with_token', { p_reset_token: resetToken, p_new_password: pw });
    if(error || !data || data.error){
      errEl.textContent = 'Der Link ist ungültig oder abgelaufen. Fordere einen neuen an.';
      errEl.classList.remove('hidden');
      return;
    }
    window.history.replaceState({}, '', window.location.pathname);

  }));

  const c = custById(session.customerId);
  openModal(`

    <p class="modal-sub">Bevor es losgeht: Bestätige deinen Namen, hinterlege deine E-Mail-Adresse (für "Passwort vergessen") und vergib dein eigenes Passwort.</p>
    <div id="setupError" class="login-error hidden"></div>
    <div class="field"><label>Dein Name</label><input id="setupName" value="${escapeHtml(c.name)}" required></div>
    <div class="field"><label>E-Mail</label><input id="setupEmail" type="email" value="${escapeHtml(c.email||'')}" required></div>
    <div class="field"><label>Neues Passwort</label><input id="setupPw" type="password" minlength="4" required></div>
    <div class="field"><label>Passwort wiederholen</label><input id="setupPwConfirm" type="password" minlength="4" required></div>
    <div class="modal-actions"><button class="btn btn-gold" id="setupSubmitBtn">Los geht's</button></div>`,
    { blocking: true }
  );
  document.getElementById('setupSubmitBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    const name = document.getElementById('setupName').value.trim();
    const email = document.getElementById('setupEmail').value.trim();
    const pw = document.getElementById('setupPw').value;
    const pwConfirm = document.getElementById('setupPwConfirm').value;
    const errEl = document.getElementById('setupError');
    if(!name || !email || !pw || pw.length < 4){
      errEl.textContent = 'Bitte alle Felder ausfüllen (Passwort mind. 4 Zeichen).';
      errEl.classList.remove('hidden'); return;
    }
    if(pw !== pwConfirm){
      errEl.textContent = 'Die Passwörter stimmen nicht überein.';
      errEl.classList.remove('hidden'); return;
    }
    const { data, error } = await sb.rpc('rpc_complete_first_login', { p_token: session.token, p_name: name, p_email: email, p_new_password: pw });
    if(error || !data || data.error){
      errEl.textContent = 'Das hat nicht geklappt. Bitte versuche es erneut.';

function custById(id){ return DATA.customers.find(c=>c.id===id); }
function apptsForDate(dateStr){ return DATA.appointments.filter(a=>a.date===dateStr); }
function blocksForDate(dateStr){ return DATA.blocks.filter(b=>b.date===dateStr); }
function isFullDayBlock(b){ return b.from==='07:00' && b.to==='24:00'; }
function isPastDate(dateStr){ const d=parseDate(dateStr); const t=new Date(); t.setHours(0,0,0,0); return d<t; }
function apptHasEnded(a){
  if(a.status!=='confirmed' || !a.start) return false;
  const now = new Date();
  const todayStr = fmtDate(now);
  if(a.date < todayStr) return true;
  if(a.date > todayStr) return false;
  const nowMin = now.getHours()*60 + now.getMinutes();
  return toMinutes(a.start) + (a.duration||60) <= nowMin;
}
function dayFlags(dateStr){
  if(session.role==='owner'){
    const appts = apptsForDate(dateStr).filter(a=>a.status!=='rejected');
    return {
      hasConfirmed: appts.some(a=>a.status==='confirmed'),
      hasRequested: appts.some(a=>a.status==='requested'),
      confirmedCount: appts.filter(a=>a.status==='confirmed').length
    };
  }
  const otherConfirmed = DATA.confirmedBusy.filter(x=>x.date===dateStr);
  const ownAppts = apptsForDate(dateStr).filter(a=>a.status!=='rejected');
  const ownConfirmedCount = ownAppts.filter(a=>a.status==='confirmed').length;
  const ownProposedHere = DATA.appointments.some(a=>a.status==='proposed' && a.proposedDate===dateStr);
  return {
    hasConfirmed: otherConfirmed.length>0 || ownConfirmedCount>0,
    hasRequested: ownAppts.some(a=>a.status==='requested' || a.status==='proposed') || ownProposedHere,
    confirmedCount: otherConfirmed.length + ownConfirmedCount
  };
}

function ownerDashboard(){
  const todayStr = fmtDate(new Date());
  const todays = apptsForDate(todayStr).filter(a=>a.status==='confirmed' && !apptHasEnded(a))
    .sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const requests = DATA.appointments.filter(a=>a.status==='requested').sort((a,b)=>a.date.localeCompare(b.date));
  const activeCustomers = DATA.customers.filter(c=>c.status==='active').length;
  const upcoming = DATA.appointments.filter(a=>a.status==='confirmed' && a.date>=todayStr && !apptHasEnded(a))
    .sort((a,b)=> a.date===b.date ? (a.start||'').localeCompare(b.start||'') : a.date.localeCompare(b.date));

  return `
  ${galleryCarousel()}
  <div class="page-head"><div><h2>Übersicht</h2><p>Willkommen zurück, ${DATA.ownerName}.</p></div></div>
  <div class="grid grid-3" style="margin-bottom:18px;">
    <div class="card stat-card"><div class="stat-label">Heutige Termine</div><div class="stat-value">${todays.length}</div><div class="stat-sub">bestätigt für heute</div></div>
    <div class="card stat-card"><div class="stat-label">Neue Anfragen</div><div class="stat-value">${requests.length}</div><div class="stat-sub">warten auf Antwort</div></div>
    <div class="card stat-card"><div class="stat-label">Aktive Kunden</div><div class="stat-value">${activeCustomers}</div><div class="stat-sub">von ${DATA.customers.length} insgesamt</div></div>
  </div>
  <div class="grid grid-2" style="margin-bottom:18px;">
    <div class="card">
      <div class="section-title">Heutige Termine <span class="tag">${todayStr.split('-').reverse().join('.')}</span></div>
      ${todays.length ? todays.map(a=>rowAppt(a)).join('') : emptyState('Keine bestätigten Termine für heute.')}
    </div>
    <div class="card">
      <div class="section-title">Neue Anfragen</div>
      ${requests.length ? requests.slice(0,5).map(a=>rowAppt(a)).join('') : emptyState('Keine offenen Anfragen.')}
    </div>
  </div>
  <div class="card">
    <div class="section-title">Alle anstehenden Termine <span class="tag">${upcoming.length}</span></div>
    ${upcoming.length ? upcoming.map(a=>rowAppt(a)).join('') : emptyState('Keine anstehenden bestätigten Termine.')}
  </div>`;
}
function rowAppt(a){
  const c = custById(a.customerId);
  let timeLabel, pillLabel;
  if(a.status==='confirmed'){ timeLabel = `${a.start} Uhr · ${a.duration} Min.`; pillLabel = 'Bestätigt'; }
  else if(a.status==='proposed'){ timeLabel = `Vorschlag: ${fmtDateHuman(a.proposedDate)}, ${a.proposedStart} Uhr`; pillLabel = 'Neuer Vorschlag'; }
  else { timeLabel = `Wunsch: ${a.requestedFrom}–${a.requestedTo} Uhr`; pillLabel = 'Angefragt'; }
  const color = a.status==='confirmed' ? 'red' : 'yellow';
  return `<div class="list-row">
    <span class="dot dot-${color}"></span>
    <div class="row-main"><b>${c?c.name:'Unbekannt'} — ${a.style}</b><small>${fmtDateHuman(a.date)} · ${timeLabel}</small></div>
    <span class="pill pill-${color}">${pillLabel}</span>
  </div>`;
}
function emptyState(msg){ return `<div class="empty-state">${ICONS.empty}<div>${msg}</div></div>`; }

function galleryCarousel(){
  const isOwner = session.role === 'owner';
  if(!GALLERY.length){
    if(!isOwner) return '';
    return `<div class="carousel-empty" id="galleryAddEmpty">${ICONS.image}<div>Bilder hinzufügen</div></div>`;

  const dots = GALLERY.map((g,i)=>`<span class="${i===carouselIndex?'active':''}" data-carousel-dot="${i}"></span>`).join('');
  const arrows = GALLERY.length>1 ? `
    <button class="carousel-arrow left" data-carousel-prev>${ICONS.chevL}</button>
    <button class="carousel-arrow right" data-carousel-next>${ICONS.chevR}</button>` : '';
  const ownerControls = isOwner ? `
    <button class="carousel-del" data-carousel-del="${GALLERY[carouselIndex].id}" title="Dieses Bild löschen">&times;</button>
    <button class="btn btn-gold btn-sm carousel-addbtn" id="galleryAddBtn">${ICONS.plus} Bild</button>` : '';
  return `<div class="carousel" id="galleryCarousel">

    ${arrows}
    ${GALLERY.length>1?`<div class="carousel-dots">${dots}</div>`:''}

}

function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>reject(new Error('read failed'));
    r.readAsDataURL(file);
  });
}

function pickGalleryImage(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  // iOS Safari fires "change" reliably only when the input is in the DOM
  input.style.position = 'fixed'; input.style.left = '-9999px'; input.style.top = '0';
  document.body.appendChild(input);
  const cleanup = ()=>{ if(input.parentNode) input.parentNode.removeChild(input); };
  input.addEventListener('change', async ()=>{
    const f = input.files && input.files[0];
    if(!f){ cleanup(); return; }
    try {
      const dataUrl = await readFileAsDataURL(f);
      cleanup();
      openCropModal(dataUrl);
    } catch(e){
      cleanup();
      toast('Bild konnte nicht geladen werden. Versuche es mit einem anderen Foto.');
    }
  });
  input.click();
}

function wireCropper(src){
  const viewport = document.getElementById('cropViewport');
  const img = document.getElementById('cropImg');
  const zoom = document.getElementById('cropZoom');
  let VW=0, VH=0, NW=0, NH=0, baseScale=1, ox=0, oy=0, z=1, ready=false;
  let dragging=false, startX=0, startY=0, startOx=0, startOy=0;

  function clamp(){
    const dispW = NW*baseScale*z, dispH = NH*baseScale*z;
    if(dispW <= VW) ox = (VW - dispW)/2; else ox = Math.min(0, Math.max(VW - dispW, ox));
    if(dispH <= VH) oy = (VH - dispH)/2; else oy = Math.min(0, Math.max(VH - dispH, oy));
  }
  function apply(){
    img.style.width = (NW*baseScale*z)+'px';
    img.style.height = (NH*baseScale*z)+'px';
    img.style.left = ox+'px';
    img.style.top = oy+'px';
  }
  img.onload = ()=>{
    NW = img.naturalWidth; NH = img.naturalHeight;
    VW = viewport.clientWidth; VH = viewport.clientHeight;
    if(!NW || !NH || !VW || !VH){ toast('Dieses Bild kann nicht angezeigt werden.'); closeModal(); return; }
    baseScale = Math.min(VW/NW, VH/NH); // fit whole image in frame by default
    z = 1;
    ox = (VW - NW*baseScale)/2; oy = (VH - NH*baseScale)/2;
    zoom.value = '1';
    ready = true;
    apply();
  };
  img.onerror = ()=>{ toast('Dieses Bildformat kann nicht angezeigt werden. Versuche ein anderes Foto.'); closeModal(); };
  img.src = src;

  zoom.addEventListener('input', ()=>{
    if(!ready) return;
    const cx = VW/2 - ox, cy = VH/2 - oy;
    const newZ = parseFloat(zoom.value);
    const ratio = newZ/z;
    ox = VW/2 - cx*ratio; oy = VH/2 - cy*ratio;
    z = newZ;
    clamp(); apply();
  });

  function pt(e){ const t = e.touches ? e.touches[0] : e; return { x:t.clientX, y:t.clientY }; }
  function onDown(e){ if(!ready) return; dragging=true; const p=pt(e); startX=p.x; startY=p.y; startOx=ox; startOy=oy;
    document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); }
  function onMove(e){ if(!dragging) return; const p=pt(e); ox=startOx+(p.x-startX); oy=startOy+(p.y-startY); clamp(); apply(); if(e.cancelable) e.preventDefault(); }
  function onUp(){ dragging=false; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
  viewport.addEventListener('mousedown', onDown);
  viewport.addEventListener('touchstart', onDown, {passive:true});
  viewport.addEventListener('touchmove', onMove, {passive:false});
  viewport.addEventListener('touchend', onUp);

  document.getElementById('cropCancelBtn').addEventListener('click', closeModal);
  document.getElementById('cropDoneBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    if(!ready){ toast('Bitte warte, bis das Bild geladen ist.'); return; }
    const scale = baseScale*z;
    const sx = -ox/scale, sy = -oy/scale, sW = VW/scale, sH = VH/scale;
    const outW = 1400, outH = Math.round(1400*VH/VW);
    const canvas = document.createElement('canvas');
    canvas.width = outW; canvas.height = outH;
    try {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#151310';
      ctx.fillRect(0, 0, outW, outH);
      ctx.drawImage(img, sx, sy, sW, sH, 0, 0, outW, outH);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      const { data, error } = await sb.rpc('rpc_add_gallery_image', { p_token: session.token, p_image_data: dataUrl });
      if(error || !data || data.error){
        toast(data && data.error==='limit_reached' ? 'Maximal 20 Bilder möglich.' : 'Hinzufügen fehlgeschlagen.');
        return;
      }
      await loadGallery(); carouselIndex = GALLERY.length-1; closeModal(); renderView();
      toast('Bild hinzugefügt');
    } catch(err){
      toast('Bild konnte nicht verarbeitet werden. Versuche ein anderes Foto.');
    }
  }));
}

function wireCarousel(){
  clearInterval(carouselTimer); carouselTimer = null;
  const addEmpty = document.getElementById('galleryAddEmpty');
  if(addEmpty) addEmpty.addEventListener('click', pickGalleryImage);
  const addBtn = document.getElementById('galleryAddBtn');
  if(addBtn) addBtn.addEventListener('click', pickGalleryImage);
  const carousel = document.getElementById('galleryCarousel');
  if(!carousel) return;
  const track = document.getElementById('carouselTrack');
  const del = carousel.querySelector('[data-carousel-del]');
  function go(i){
    carouselIndex = (i + GALLERY.length) % GALLERY.length;
    track.style.transform = `translateX(-${carouselIndex*100}%)`;
    carousel.querySelectorAll('[data-carousel-dot]').forEach((d,idx)=>d.classList.toggle('active', idx===carouselIndex));
    if(del) del.dataset.carouselDel = GALLERY[carouselIndex].id;
  }
  function resetAuto(){
    clearInterval(carouselTimer);
    if(GALLERY.length>1) carouselTimer = setInterval(()=>go(carouselIndex+1), 4500);
  }
  const prev = carousel.querySelector('[data-carousel-prev]');
  const next = carousel.querySelector('[data-carousel-next]');
  if(prev) prev.addEventListener('click', ()=>{ go(carouselIndex-1); resetAuto(); });
  if(next) next.addEventListener('click', ()=>{ go(carouselIndex+1); resetAuto(); });
  carousel.querySelectorAll('[data-carousel-dot]').forEach(d=>d.addEventListener('click', ()=>{ go(Number(d.dataset.carouselDot)); resetAuto(); }));
  if(del) del.addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    if(!confirm('Dieses Bild löschen?')) return;
    await sb.rpc('rpc_delete_gallery_image', { p_token: session.token, p_id: Number(del.dataset.carouselDel) });
    await loadGallery(); if(carouselIndex>=GALLERY.length) carouselIndex = Math.max(0, GALLERY.length-1); renderView();
  }));
  let startX = null;
  track.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; }, {passive:true});
  track.addEventListener('touchend', e=>{
    if(startX===null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(Math.abs(dx)>40){ go(dx<0 ? carouselIndex+1 : carouselIndex-1); resetAuto(); }
    startX = null;
  });
  resetAuto();
}

function calendarView(isOwner){
  const year = calCursor.getFullYear(), month = calCursor.getMonth();
  const first = new Date(year, month, 1);
  const startWeekday = (first.getDay()+6)%7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthLabel = calCursor.toLocaleDateString('de-DE',{month:'long', year:'numeric'});
  const dowLabels = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const todayStr = fmtDate(new Date());

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${pad(month+1)}-${pad(d)}`;
    const blocks = blocksForDate(dateStr);
    const fullBlock = blocks.some(isFullDayBlock);
    const { hasConfirmed, hasRequested, confirmedCount } = dayFlags(dateStr);
    let tint = '';
    if(fullBlock) tint='tint-black';
    else if(hasConfirmed) tint='tint-red';
    else if(hasRequested) tint='tint-yellow';
    const dotColors = [];
    if(hasConfirmed) dotColors.push('red');
    if(hasRequested) dotColors.push('yellow');
    if(blocks.length && !fullBlock) dotColors.push('black');
    const past = isPastDate(dateStr);
    cells += `<button class="cal-day ${tint} ${dateStr===todayStr?'today':''} ${past?'past':''}" data-day="${dateStr}">
      ${confirmedCount>0?`<span class="cal-count">${confirmedCount}</span>`:''}
      <span>${d}</span>
      <span class="dots">${fullBlock?`<span class="dot dot-black"></span>`:dotColors.map(c=>`<span class="dot dot-${c}"></span>`).join('')}</span>
    </button>`;
  }

  return `
  <div class="page-head">
    <div><h2>Kalender</h2><p>${isOwner?'Verwalte Anfragen, Termine und blockierte Zeiten.':'Wähle einen Tag, um deinen Wunschzeitraum anzufragen.'}</p></div>
    ${!isOwner?`<button class="btn btn-gold" id="reqApptBtnCal" style="width:auto;">${ICONS.plus} Termin anfragen</button>`:''}
  </div>
  <div class="card">
    <div class="cal-head">
      <div class="cal-nav"><button class="icon-btn" id="prevMonth">${ICONS.chevL}</button></div>
      <div class="month-label">${monthLabel}</div>
      <div class="cal-nav"><button class="icon-btn" id="nextMonth">${ICONS.chevR}</button></div>
    </div>
    <div class="legend">
      <span><span class="dot dot-green"></span> Frei</span>
      <span><span class="dot dot-yellow"></span> Angefragt</span>
      <span><span class="dot dot-red"></span> Bestätigt</span>
      <span><span class="dot dot-black"></span> Blockiert</span>
    </div>
    <div class="cal-grid">
      ${dowLabels.map(l=>`<div class="cal-dow">${l}</div>`).join('')}
      ${cells}
    </div>
  </div>
  <div id="dayDetail" style="margin-top:18px;"></div>`;
}

function dayDetailPanel(dateStr, isOwner){

    appts = appts.concat(proposedHere);
  }
  appts = appts.sort((a,b)=>(a.start||a.proposedStart||a.requestedFrom).localeCompare(b.start||b.proposedStart||b.requestedFrom));
  const otherBusy = isOwner ? [] : DATA.confirmedBusy.filter(x=>x.date===dateStr).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const past = isPastDate(dateStr);

  let body = '';
  blocks.forEach(b=>{
    body += `<div class="slot-row"><span class="dot dot-black"></span><div class="row-main"><b>Blockiert · ${b.from}–${b.to} Uhr</b><small>${b.reason||'Kein Grund angegeben'}</small></div>
      ${isOwner?`<div class="slot-action"><button class="btn btn-sm btn-ghost" data-unblock="${b.id}">Freigeben</button></div>`:''}
    </div>`;
  });
  otherBusy.forEach(x=>{
    body += `<div class="slot-row"><span class="dot dot-red"></span><div class="row-main"><b>Belegt · ${x.start} Uhr · ${x.duration} Min.</b><small>Bereits bestätigter Termin eines anderen Kunden</small></div></div>`;
  });
  appts.forEach(a=>{
    const c = custById(a.customerId);
    let timeLabel, statusPill;
    if(a.status==='confirmed'){ timeLabel = `${a.start} Uhr · ${a.duration} Min.`; statusPill = 'Bestätigt'; }
    else if(a.status==='proposed'){ timeLabel = `Vorschlag: ${fmtDateHuman(a.proposedDate)}, ${a.proposedStart} Uhr`; statusPill = 'Neuer Vorschlag'; }
    else { timeLabel = `Wunsch: ${a.requestedFrom}–${a.requestedTo} Uhr`; statusPill = 'Angefragt'; }
    const color = a.status==='confirmed' ? 'red' : 'yellow';
    body += `<div class="slot-row">
      <span class="dot dot-${color}"></span>
      <div class="row-main"><b>${timeLabel} · ${a.style}${isOwner?` — ${c?c.name:'?'}`:''}</b><small>${a.comment?'"'+escapeHtml(a.comment)+'"':''}</small></div>
      <div class="slot-action">
        ${isOwner && a.status==='requested' ? `<button class="btn btn-sm btn-outline-gold" data-confirm="${a.id}">Bestätigen</button><button class="btn btn-sm btn-danger" data-reject-flow="${a.id}">Ablehnen</button>`:''}
        ${isOwner && a.status==='confirmed' ? `<button class="btn btn-sm btn-danger" data-reject-flow="${a.id}">Absagen</button>`:''}
        ${isOwner && a.status==='proposed' ? `<span class="pill pill-yellow">Wartet auf Kunde</span>`:''}
        ${!isOwner && a.status==='proposed' ? `<button class="btn btn-sm btn-outline-gold" data-accept-proposal="${a.id}">Annehmen</button><button class="btn btn-sm btn-danger" data-reject="${a.id}">Ablehnen</button>`:''}
        ${!isOwner && a.status!=='proposed' ? `<span class="pill pill-${color}">${statusPill}</span>`:''}
      </div>
    </div>`;
  });
  if(!body) body = emptyState('Für diesen Tag liegen noch keine Termine vor.');

  const ownerActions = isOwner && !past ? `<div class="modal-actions"><button class="btn btn-outline-gold btn-sm" id="blockDayBtn" style="width:auto;">Zeit blockieren</button></div>` : '';
  const kundeAction = !isOwner && !past ? `<div class="modal-actions"><button class="btn btn-gold btn-sm" id="requestOnDayBtn" style="width:auto;">${ICONS.plus} Termin an diesem Tag anfragen</button></div>` : '';

  return `<div class="card">
    <div class="section-title">${fmtDateHuman(dateStr)}</div>
    ${body}
    ${ownerActions}
    ${kundeAction}
  </div>`;
}

function wireRequestModal(){
  const dropZone = document.getElementById('fileDrop');
  const fileInput = document.getElementById('reqImage');
  let imageData = null;
  dropZone.addEventListener('click', ()=>fileInput.click());
  fileInput.addEventListener('change', ()=>{
    const f = fileInput.files[0]; if(!f) return;
    if(f.size > 3*1024*1024){ toast('Bild zu groß (max. 3 MB)'); return; }
    const reader = new FileReader();
    reader.onload = ()=>{ imageData = reader.result; const prev=document.getElementById('filePreview'); prev.src=imageData; prev.classList.remove('hidden'); dropZone.textContent='Bild ausgewählt'; };
    reader.readAsDataURL(f);
  });
  const styleSelect = document.getElementById('reqStyle');
  const customField = document.getElementById('reqCustomStyleField');
  styleSelect.addEventListener('change', ()=>{
    customField.classList.toggle('hidden', styleSelect.value !== '__custom__');
  });
  document.getElementById('submitReqBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    const date = document.getElementById('reqDate').value;
    const from = document.getElementById('reqFrom').value;
    const to = document.getElementById('reqTo').value;
    if(toMinutes(to) <= toMinutes(from)){ toast('"Bis" muss nach "Von" liegen.'); return; }
    let style = styleSelect.value;
    if(style === '__custom__'){
      style = document.getElementById('reqCustomStyle').value.trim();
      if(!style){ toast('Bitte deinen Frisurwunsch eingeben.'); return; }
    }
    const comment = document.getElementById('reqComment').value.trim();
    const { data, error } = await sb.rpc('rpc_request_appointment', { p_token: session.token, p_date: date, p_from: from, p_to: to, p_style: style, p_comment: comment, p_image: imageData });
    if(error || !data || !data.ok){ toast('Anfrage fehlgeschlagen'); return; }
    notifyEvent('new_request', data.id);
    await refreshState(); closeModal(); toast('Anfrage gesendet');
    selectedDay = date; renderView();
  }));
}
function wireDayDetail(){
  const blockBtn = document.getElementById('blockDayBtn');
  if(blockBtn) blockBtn.addEventListener('click', ()=>{
    openModal(blockModal(selectedDay));
    const fullChk = document.getElementById('fullDayChk');
    const fromSel = document.getElementById('blockFrom'), toSel = document.getElementById('blockTo');
    fullChk.addEventListener('change', ()=>{
      if(fullChk.checked){ fromSel.value='07:00'; toSel.value='24:00'; fromSel.disabled=true; toSel.disabled=true; }
      else{ fromSel.disabled=false; toSel.disabled=false; }
    });
    document.getElementById('saveBlockBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
      const from = fromSel.value, to = toSel.value;
      if(toMinutes(to) <= toMinutes(from)){ toast('"Bis" muss nach "Von" liegen.'); return; }
      const reason = document.getElementById('blockReason').value.trim();
      await sb.rpc('rpc_block_time', { p_token: session.token, p_date: selectedDay, p_from: from, p_to: to, p_reason: reason });
      await refreshState(); closeModal(); toast('Zeit blockiert'); renderView();
    }));
  });
  document.querySelectorAll('[data-unblock]').forEach(b=>b.addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    await sb.rpc('rpc_unblock', { p_token: session.token, p_id: Number(b.dataset.unblock) });
    await refreshState(); toast('Freigegeben'); renderView();
  })));
  document.querySelectorAll('[data-confirm]').forEach(b=>b.addEventListener('click', ()=>{
    const a = DATA.appointments.find(x=>String(x.id)===b.dataset.confirm);
    openModal(confirmApptModal(a));
    document.getElementById('saveConfirmBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
      const start = document.getElementById('confirmStart').value;
      const duration = parseInt(document.getElementById('confirmDuration').value,10) || 60;
      await sb.rpc('rpc_confirm_appointment', { p_token: session.token, p_id: a.id, p_start: start, p_duration: duration });
      notifyEvent('confirmed', a.id);
      await refreshState(); closeModal(); toast('Termin bestätigt'); renderView();
    }));
  }));
  document.querySelectorAll('[data-reject-flow]').forEach(b=>b.addEventListener('click', ()=>{
    const a = DATA.appointments.find(x=>String(x.id)===b.dataset.rejectFlow);
    openModal(rejectFlowModal(a, a.status==='confirmed'));
    document.getElementById('rejectFlowCloseBtn').addEventListener('click', closeModal);
    document.getElementById('rejectNoAltBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
      await sb.rpc('rpc_reject_appointment', { p_token: session.token, p_id: a.id });
      notifyEvent('rejected', a.id);
      await refreshState(); closeModal(); toast('Termin abgelehnt'); renderView();
    }));
    document.getElementById('rejectAltBtn').addEventListener('click', ()=>{
      openModal(proposeAltModal(a));
      document.getElementById('proposeAltCloseBtn').addEventListener('click', closeModal);
      document.getElementById('sendAltBtn').addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
        const date = document.getElementById('altDate').value;
        const start = document.getElementById('altStart').value;
        const duration = parseInt(document.getElementById('altDuration').value,10) || 60;
        await sb.rpc('rpc_propose_alternative', { p_token: session.token, p_id: a.id, p_date: date, p_start: start, p_duration: duration });
        notifyEvent('proposed', a.id);
        await refreshState(); closeModal(); toast('Alternativtermin vorgeschlagen'); renderView();
      }));
    });
  }));
  document.querySelectorAll('[data-reject]').forEach(b=>b.addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    const id = Number(b.dataset.reject);
    await sb.rpc('rpc_reject_appointment', { p_token: session.token, p_id: id });
    notifyEvent('proposal_declined', id);
    await refreshState(); toast('Termin abgelehnt'); renderView();
  })));
  document.querySelectorAll('[data-accept-proposal]').forEach(b=>b.addEventListener('click', (e)=>withLock(e.currentTarget, async ()=>{
    const id = Number(b.dataset.acceptProposal);
    await sb.rpc('rpc_accept_proposal', { p_token: session.token, p_id: id });
    notifyEvent('proposal_accepted', id);
    await refreshState(); toast('Termin bestätigt'); renderView();
  })));
  const reqOnDay = document.getElementById('requestOnDayBtn');
  if(reqOnDay) reqOnDay.addEventListener('click', ()=>{ openModal(requestApptModal(selectedDay)); wireRequestModal(); });
}

(async function boot(){
  addPasswordToggles(document.getElementById('loginScreen'));
  const resetToken = new URLSearchParams(window.location.search).get('reset');
  if(resetToken){
    document.getElementById('loginScreen').style.display='flex';
    showResetPasswordScreen(resetToken);
    return;
  }
  const savedToken = localStorage.getItem(SESSION_KEY);
  if(savedToken){
    const { data, error } = await sb.rpc('rpc_get_state', { p_token: savedToken });
    if(!error && data && !data.error){
      session = { token: savedToken, role: data.role === 'owner' ? 'owner' : 'kunde', customerId: data.customerId };
      applyState(data);
      enterApp();
      return;
    }
    localStorage.removeItem(SESSION_KEY);
  }
  document.getElementById('loginScreen').style.display='flex';
})();
</script>
</body>
</html>
